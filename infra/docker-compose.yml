services:
  web:
    image: node:24-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - ../apps/web:/app
      - web-node-modules:/app/node_modules
    environment:
      VITE_PLATFORM_API_URL: http://localhost:8080/api
      VITE_SIMULATION_API_URL: http://localhost:5001/api

  platform:
    build:
      context: ../apps/platform
    ports:
      - "8080:8080"
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      APP_ENV: local
      APP_KEY: ${PLATFORM_APP_KEY:-}
      APP_DEBUG: "true"
      DB_CONNECTION: mysql
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_DATABASE: meridian
      DB_USERNAME: meridian
      DB_PASSWORD: meridian
      QUEUE_CONNECTION: redis
      REDIS_HOST: redis

  simulation:
    build:
      context: ../apps/simulation
      args:
        INSTALL_ENERGY_EXTRAS: ${INSTALL_ENERGY_EXTRAS:-true}
    ports:
      - "5001:5001"
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      REDIS_URL: redis://redis:6379/0
      SIMULATION_DATABASE_URL: mysql+pymysql://meridian:meridian@mariadb:3306/meridian
      SIMULATION_ARTIFACT_DIR: /app/storage/artifacts
      SIMULATION_SYNC_JOBS: "false"
      MODAL_LLM_ENDPOINT: ${MODAL_LLM_ENDPOINT:-}
      NREL_API_KEY: ${NREL_API_KEY:-}
      EIA_API_KEY: ${EIA_API_KEY:-}

  worker:
    build:
      context: ../apps/simulation
      args:
        INSTALL_ENERGY_EXTRAS: ${INSTALL_ENERGY_EXTRAS:-true}
    command: celery -A meridian_simulation.tasks.celery_app worker --loglevel=INFO
    healthcheck:
      disable: true
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      REDIS_URL: redis://redis:6379/0
      SIMULATION_DATABASE_URL: mysql+pymysql://meridian:meridian@mariadb:3306/meridian
      SIMULATION_ARTIFACT_DIR: /app/storage/artifacts
      SIMULATION_SYNC_JOBS: "false"
      MODAL_LLM_ENDPOINT: ${MODAL_LLM_ENDPOINT:-}
      NREL_API_KEY: ${NREL_API_KEY:-}
      EIA_API_KEY: ${EIA_API_KEY:-}

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  mariadb:
    image: mariadb:11
    ports:
      - "3306:3306"
    environment:
      MARIADB_DATABASE: meridian
      MARIADB_USER: meridian
      MARIADB_PASSWORD: meridian
      MARIADB_ROOT_PASSWORD: meridian-root
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - mariadb-data:/var/lib/mysql

volumes:
  web-node-modules:
  mariadb-data:
